<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉채 — 보유 재료 기반 레시피 추천</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2E7D32;
      --primary-light: #E8F5E9;
      --primary-mid: #43A047;
      --bg: #F7FAF7;
      --surface: #FFFFFF;
      --text: #212121;
      --text-light: #757575;
      --border: #E0E0E0;
      --danger: #E53935;
      --danger-light: #FFEBEE;
      --warning: #F57C00;
      --warning-light: #FFF3E0;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: var(--primary);
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(46,125,50,0.3);
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }

    /* ── 레이아웃 ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .icon { font-size: 18px; }

    /* ── 섹션 레이블 ── */
    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── 칩 선택 (프로필) ── */
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .chip {
      padding: 8px 14px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-light);
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* ── 카운터 ── */
    .counter {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .counter-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .counter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .counter-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      min-width: 30px;
      text-align: center;
    }

    /* ── 재료 입력 ── */
    .ingredient-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .ingredient-input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      color: var(--text);
    }
    .ingredient-input-row input:focus { border-color: var(--primary); }
    .ingredient-input-row input[type="date"] { flex: 0 0 140px; }
    .add-btn {
      padding: 10px 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .add-btn:hover { background: var(--primary-mid); }

    /* ── 재료 목록 ── */
    .ingredient-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
    }
    .ingredient-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: var(--bg);
      border-radius: 10px;
      font-size: 14px;
    }
    .ingredient-item.expiring {
      background: var(--danger-light);
    }
    .ingredient-name { font-weight: 500; }
    .expiry-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--warning-light);
      color: var(--warning);
      margin-left: 8px;
    }
    .expiry-badge.urgent {
      background: var(--danger-light);
      color: var(--danger);
    }
    .remove-btn {
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .remove-btn:hover { background: var(--border); color: var(--danger); }

    /* ── 추천 버튼 ── */
    .recommend-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(46,125,50,0.3);
    }
    .recommend-btn:hover { background: var(--primary-mid); transform: translateY(-1px); }
    .recommend-btn:disabled { background: var(--border); color: var(--text-light); transform: none; box-shadow: none; cursor: not-allowed; }

    /* ── 로딩 ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 에러 ── */
    .error-box {
      background: var(--danger-light);
      border: 1px solid #FFCDD2;
      border-radius: 12px;
      padding: 16px;
      color: var(--danger);
      margin-bottom: 16px;
      font-size: 14px;
    }

    /* ── 검증 상태 배너 ── */
    .validate-banner {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .validate-banner.pass {
      background: var(--primary-light);
      color: var(--primary);
    }
    .validate-banner.fail {
      background: var(--warning-light);
      color: var(--warning);
    }

    /* ── 레시피 카드 ── */
    .recipe-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      border-left: 4px solid var(--primary);
      transition: transform 0.15s;
    }
    .recipe-card:hover { transform: translateY(-2px); }
    .recipe-card.expiring-featured { border-left-color: var(--danger); }

    .recipe-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }
    .recipe-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .recipe-meta {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .meta-chip {
      font-size: 12px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .expiring-badge {
      background: var(--danger);
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }

    /* ── 태그 ── */
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .tag {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--primary-light);
      color: var(--primary);
    }

    /* ── 재료 섹션 ── */
    .ingredients-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .ing-group-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ing-list {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
    }
    .ing-list .missing { color: var(--warning); }

    /* ── 조리 순서 ── */
    details summary {
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      padding: 8px 0;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details summary::before {
      content: '▶';
      font-size: 10px;
      transition: transform 0.2s;
    }
    details[open] summary::before { transform: rotate(90deg); }
    .steps-list {
      padding: 10px 0 4px;
      counter-reset: step;
    }
    .step-item {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .step-num {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    /* ── RAG 컨텍스트 ── */
    .rag-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .rag-content {
      font-size: 12px;
      color: var(--text-light);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── 피드백 ── */
    .feedback-box {
      background: var(--warning-light);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 12px;
      color: var(--warning);
      margin-top: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🥬</span>
  <div>
    <h1>냉채</h1>
    <p>보유 재료 기반 AI 레시피 추천</p>
  </div>
</header>

<div class="layout">
  <!-- ── 왼쪽 패널: 설정 ── -->
  <aside>

    <!-- 가구 프로필 -->
    <div class="card">
      <div class="card-title"><span class="icon">👤</span> 내 프로필</div>

      <label class="field-label">가구 형태</label>
      <div class="chip-group" id="household-chips">
        <button class="chip" data-val="single" onclick="selectChip('household', 'single', this)">1인 가구</button>
        <button class="chip" data-val="family" onclick="selectChip('household', 'family', this)">핵가족</button>
      </div>

      <div id="member-count-section" style="display:none">
        <label class="field-label">가구원 수</label>
        <div class="counter">
          <button class="counter-btn" onclick="changeMember(-1)">−</button>
          <span class="counter-value" id="member-display">2</span>
          <button class="counter-btn" onclick="changeMember(1)">+</button>
          <span style="font-size:13px; color:var(--text-light); margin-left:4px">명</span>
        </div>
      </div>

      <label class="field-label">조리 환경</label>
      <div class="chip-group" id="cooking-env-chips">
        <button class="chip" data-val="microwave" onclick="selectChip('cookingEnv', 'microwave', this)">⚡ 전자레인지만</button>
        <button class="chip" data-val="oneburner" onclick="selectChip('cookingEnv', 'oneburner', this)">🔥 가스레인지 1구</button>
        <button class="chip" data-val="full" onclick="selectChip('cookingEnv', 'full', this)">🍳 풀옵션</button>
      </div>

      <label class="field-label">음식 취향 (복수 선택)</label>
      <div class="chip-group" id="preference-chips">
        <button class="chip" data-val="korean" onclick="togglePref('korean', this)">🍚 한식</button>
        <button class="chip" data-val="western" onclick="togglePref('western', this)">🍝 양식</button>
        <button class="chip" data-val="japanese" onclick="togglePref('japanese', this)">🍣 일식</button>
        <button class="chip" data-val="highprotein" onclick="togglePref('highprotein', this)">💪 고단백</button>
        <button class="chip" data-val="none" onclick="togglePref('none', this)">✨ 제한없음</button>
      </div>
    </div>

    <!-- 냉장고 재료 -->
    <div class="card">
      <div class="card-title"><span class="icon">🧊</span> 냉장고 재료</div>

      <div class="ingredient-input-row">
        <input type="text" id="ing-name" placeholder="재료명 (예: 계란)" onkeydown="if(event.key==='Enter') addIngredient()">
        <input type="date" id="ing-expiry" title="유통기한 (선택)">
        <button class="add-btn" onclick="addIngredient()">추가</button>
      </div>

      <div class="ingredient-list" id="ingredient-list">
        <div style="font-size:13px; color:var(--text-light); text-align:center; padding:12px 0">
          재료를 추가해보세요
        </div>
      </div>
    </div>

    <!-- 추천 버튼 -->
    <button class="recommend-btn" id="recommend-btn" onclick="recommend()" disabled>
      <span>🍽️</span> 레시피 추천받기
    </button>

    <div style="font-size:12px; color:var(--text-light); text-align:center; margin-top:8px">
      RAG + Agent 파이프라인 · Upstage Solar
    </div>
  </aside>

  <!-- ── 오른쪽 패널: 결과 ── -->
  <main id="result-panel">
    <div class="empty-state">
      <div class="emoji">🥬</div>
      <p>냉장고 재료를 추가하고<br>조리 환경·취향을 선택한 뒤<br><strong>레시피 추천받기</strong>를 눌러보세요</p>
    </div>
  </main>
</div>

<script>
// ── 상태 ──────────────────────────────────────
const state = {
  household: null,      // 'single' | 'family'
  memberCount: 2,
  cookingEnv: null,     // 'microwave' | 'oneburner' | 'full'
  preferences: [],      // ['korean', ...]
  ingredients: [],      // { name, expiryDate }
};

// ── 유틸 ──────────────────────────────────────
function today() {
  return new Date().toISOString().slice(0, 10);
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const diff = (new Date(dateStr) - new Date(today())) / 86400000;
  return Math.ceil(diff);
}

function updateRecommendBtn() {
  const ok = state.household && state.cookingEnv && state.preferences.length > 0 && state.ingredients.length > 0;
  document.getElementById('recommend-btn').disabled = !ok;
}

// ── 프로필 선택 ──────────────────────────────
// 재료 추가/삭제와 마찬가지로 프로필도 바뀔 때마다 즉시 서버에 저장한다(별도 "저장" 버튼 없음).
// household/cookingEnv/preferences 세 가지가 모두 채워졌을 때만 저장을 시도한다 — 서버의
// UserProfile 모델이 세 필드를 전부 필수로 받기 때문에 부분 상태로 보내면 422 에러가 난다.
function persistProfileIfComplete() {
  if (state.household && state.cookingEnv && state.preferences.length > 0) {
    fetch('/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        householdType: state.household,
        memberCount: state.memberCount,
        cookingEnv: state.cookingEnv,
        foodPreference: state.preferences,
      }),
    }).catch(e => console.error('프로필 저장 실패', e));
  }
}

function selectChip(field, val, btn) {
  // field: 'household' | 'cookingEnv'
  const containerId = field === 'household' ? 'household-chips' : 'cooking-env-chips';
  document.querySelectorAll(`#${containerId} .chip`).forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');

  if (field === 'household') {
    state.household = val;
    const memberSection = document.getElementById('member-count-section');
    memberSection.style.display = val === 'family' ? 'block' : 'none';
    if (val === 'single') state.memberCount = 1;
  } else {
    state.cookingEnv = val;
  }
  updateRecommendBtn();
  persistProfileIfComplete();
}

function togglePref(val, btn) {
  if (val === 'none') {
    // none 선택 시 나머지 해제
    state.preferences = ['none'];
    document.querySelectorAll('#preference-chips .chip').forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
  } else {
    // 다른 값 선택 시 none 해제
    state.preferences = state.preferences.filter(p => p !== 'none');
    document.querySelector('#preference-chips .chip[data-val="none"]').classList.remove('selected');
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      state.preferences = state.preferences.filter(p => p !== val);
    } else {
      btn.classList.add('selected');
      state.preferences.push(val);
    }
  }
  updateRecommendBtn();
  persistProfileIfComplete();
}

function changeMember(delta) {
  state.memberCount = Math.max(1, Math.min(5, state.memberCount + delta));
  document.getElementById('member-display').textContent = state.memberCount;
  persistProfileIfComplete();
}

// ── 재료 관리 (서버 DB와 항상 동기화) ──────────
async function refreshIngredients() {
  const res = await fetch('/fridge');
  state.ingredients = await res.json(); // [{id, name, expiryDate}, ...]
  renderIngredients();
  updateRecommendBtn();
}

async function addIngredient() {
  const nameEl = document.getElementById('ing-name');
  const expiryEl = document.getElementById('ing-expiry');
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }

  await fetch('/fridge', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, expiryDate: expiryEl.value || null }),
  });
  nameEl.value = '';
  expiryEl.value = '';
  nameEl.focus();
  await refreshIngredients();
}

async function removeIngredient(id) {
  await fetch(`/fridge/${id}`, { method: 'DELETE' });
  await refreshIngredients();
}

function renderIngredients() {
  const list = document.getElementById('ingredient-list');
  if (state.ingredients.length === 0) {
    list.innerHTML = '<div style="font-size:13px; color:var(--text-light); text-align:center; padding:12px 0">재료를 추가해보세요</div>';
    return;
  }
  list.innerHTML = state.ingredients.map((ing) => {
    const days = daysUntil(ing.expiryDate);
    const isUrgent = days !== null && days <= 1;
    const isExpiring = days !== null && days <= 3;
    let badge = '';
    if (days !== null) {
      const label = days <= 0 ? '오늘 만료' : `D${days > 0 ? '+' : ''}${days}`;
      badge = `<span class="expiry-badge${isUrgent ? ' urgent' : ''}">${label}</span>`;
    }
    return `
      <div class="ingredient-item${isExpiring ? ' expiring' : ''}">
        <span>
          <span class="ingredient-name">${esc(ing.name)}</span>
          ${badge}
        </span>
        <button class="remove-btn" onclick="removeIngredient(${ing.id})">✕</button>
      </div>`;
  }).join('');
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 추천 API 호출 ──────────────────────────────
async function recommend() {
  const panel = document.getElementById('result-panel');
  const btn = document.getElementById('recommend-btn');

  btn.disabled = true;
  panel.innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p style="font-weight:600; margin-bottom:4px">AI가 레시피를 찾는 중...</p>
      <p style="font-size:12px">RAG 검색 → 레시피 생성 → 검증</p>
    </div>`;

  try {
    // 프로필·재료는 서버 DB에 이미 저장돼 있으므로 today만 보내면 된다.
    const res = await fetch('/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ today: today() }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `서버 오류 (${res.status})`);
    }

    const data = await res.json();
    renderResult(data);
  } catch (e) {
    panel.innerHTML = `
      <div class="error-box">
        ⚠️ 오류가 발생했습니다: ${esc(e.message)}
      </div>`;
  } finally {
    btn.disabled = false;
    updateRecommendBtn();
  }
}

function renderResult(data) {
  const panel = document.getElementById('result-panel');

  const validBanner = data.valid
    ? `<div class="validate-banner pass">✅ 검증 통과 · 재시도 ${data.retryCount}회</div>`
    : `<div class="validate-banner fail">⚠️ 검증 미통과 · 재시도 ${data.retryCount}회 (최선의 결과 반환)</div>`;

  const feedbackHtml = (!data.valid && data.feedback)
    ? `<div class="feedback-box">검증 피드백:\n${esc(data.feedback)}</div>`
    : '';

  const recipesHtml = data.recipes.map((r, i) => renderRecipe(r, i)).join('');

  const ragHtml = `
    <details style="margin-bottom:16px">
      <summary style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; font-weight:700; color:var(--text-light); list-style:none; padding:12px 16px; background:var(--surface); border-radius:12px; box-shadow:var(--shadow)">
        📚 RAG 검색 참고자료 보기
      </summary>
      <div class="rag-section" style="margin-top:8px">
        <div class="rag-content">${esc(data.retrievedContext)}</div>
      </div>
    </details>`;

  panel.innerHTML = validBanner + feedbackHtml + recipesHtml + ragHtml;
}

function renderRecipe(r, idx) {
  const expiringBadge = r.usesExpiringIngredient
    ? `<span class="expiring-badge">⏰ 임박재료 사용</span>`
    : '';

  const tagsHtml = r.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('');

  const usedHtml = r.usedIngredients.length
    ? r.usedIngredients.map(i => `<div>${esc(i)}</div>`).join('')
    : '<div style="color:var(--text-light)">없음</div>';

  const missingHtml = r.missingIngredients.length
    ? r.missingIngredients.map(i => `<div class="missing">+ ${esc(i)}</div>`).join('')
    : '<div style="color:var(--primary)">없음 ✓</div>';

  const stepsHtml = r.steps.map((s, i) =>
    `<div class="step-item"><span class="step-num">${i+1}</span><span>${esc(s)}</span></div>`
  ).join('');

  return `
    <div class="recipe-card${r.usesExpiringIngredient ? ' expiring-featured' : ''}">
      <div class="recipe-header">
        <div>
          <div class="recipe-name">${esc(r.name)}</div>
          <div class="recipe-meta">
            <span class="meta-chip">⏱ ${r.cookingTime}분</span>
            <span class="meta-chip">🍽 ${r.servings}인분</span>
          </div>
        </div>
        ${expiringBadge}
      </div>

      ${tagsHtml ? `<div class="tag-row">${tagsHtml}</div>` : ''}

      <div class="ingredients-section">
        <div>
          <div class="ing-group-title">사용 재료</div>
          <div class="ing-list">${usedHtml}</div>
        </div>
        <div>
          <div class="ing-group-title">추가 필요</div>
          <div class="ing-list">${missingHtml}</div>
        </div>
      </div>

      <details>
        <summary>조리 순서 보기 (${r.steps.length}단계)</summary>
        <div class="steps-list">${stepsHtml}</div>
      </details>
    </div>`;
}

// ── 초기화 (서버에 저장된 프로필·재료를 불러와 화면에 반영) ──
async function loadProfile() {
  const res = await fetch('/profile');
  const profile = await res.json(); // 저장된 적 없으면 null
  if (!profile) return;

  state.household = profile.householdType;
  state.memberCount = profile.memberCount;
  state.cookingEnv = profile.cookingEnv;
  state.preferences = profile.foodPreference;

  document.querySelectorAll('#household-chips .chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.val === profile.householdType);
  });
  document.getElementById('member-count-section').style.display =
    profile.householdType === 'family' ? 'block' : 'none';
  document.getElementById('member-display').textContent = profile.memberCount;

  document.querySelectorAll('#cooking-env-chips .chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.val === profile.cookingEnv);
  });

  document.querySelectorAll('#preference-chips .chip').forEach(c => {
    c.classList.toggle('selected', profile.foodPreference.includes(c.dataset.val));
  });
}

async function init() {
  await loadProfile();
  await refreshIngredients();
  updateRecommendBtn();
}

init();
</script>
</body>
</html>
